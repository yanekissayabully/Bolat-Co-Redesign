<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>amoCRM Form</title>
  <style>
    /* Чистый фон и центр контейнера, если надо */
    html, body { margin:0; padding:0; background:#fff; }
    .form-host { max-width: 560px; margin: 0 auto; padding: 16px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="form-host" id="amo_form_container"></div>

  <script>
    !function(a,m,o,c,r,m){
      a[o+c]=a[o+c]||{setMeta:function(p){this.params=(this.params||[]).concat([p])}};
      a[o+r]=a[o+r]||function(f){a[o+r].f=(a[o+r].f||[]).concat([f])};
      a[o+r]({id:"1615958",hash:"b1cee69bfda52af67a28cb06cdedfd43",locale:"ru"});
      a[o+m]=a[o+m]||function(f,k){a[o+m].f=(a[o+m].f||[]).concat([[f,k]])};
    }(window,0,"amo_forms_","params","load","loaded");
  </script>
  <script id="amoforms_script_1615958" async charset="utf-8" src="https://forms.amocrm.ru/forms/assets/js/amoforms.js?1760524136"></script>

  <!-- Авто-ресайз для родителя -->
  <script>
    function postHeight() {
      const h = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );
      parent.postMessage({ type: 'amoformHeight', h }, '*');
    }

    // Пульнём высоту на старте и при изменениях
    window.addEventListener('load', () => {
      postHeight();
      setTimeout(postHeight, 600); // на случай поздней инициализации
      setTimeout(postHeight, 1500);
    });

    // Отслеживаем любые изменения DOM (форма может дорендериваться)
    const mo = new MutationObserver(() => postHeight());
    mo.observe(document.documentElement, { childList: true, subtree: true });
  </script>
</body>
</html>
